<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroRoute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
 <style>
:root{
  --primary:#ff7f00;
  --primary-soft:rgba(255,127,0,0.15);
  --primary-border:rgba(255,127,0,0.35);
  --text-main:#ffb366;
  --text-dim:rgba(255,179,102,0.6);
  --bg-main:#0b0b0b;
  --bg-card:#111111;
  --bg-soft:#151515;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:340px;
  background:var(--bg-main);
  color:var(--text-main);
  font-family:'DM Sans',sans-serif;
}

/* HEADER */

.header{
  background:var(--bg-card);
  border-bottom:1px solid var(--primary-soft);
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-hex{
  font-size:20px;
  color:var(--primary);
  animation:glow 2.5s infinite ease-in-out;
}

@keyframes glow{
  0%{text-shadow:0 0 6px var(--primary);}
  50%{text-shadow:0 0 16px var(--primary);}
  100%{text-shadow:0 0 6px var(--primary);}
}

.logo-title{
  font-family:'Space Mono',monospace;
  font-size:14px;
  font-weight:700;
  color:var(--primary);
}

.logo-sub{
  font-size:10px;
  color:var(--text-dim);
}

.status-pill{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:9px;
  font-family:'Space Mono',monospace;
  background:var(--primary-soft);
  border:1px solid var(--primary-border);
  padding:4px 8px;
  border-radius:20px;
  color:var(--primary);
}

.status-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--primary);
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}

/* QUERY SECTION */

.query-section{
  padding:16px;
}

.query-label{
  font-size:9px;
  font-family:'Space Mono',monospace;
  letter-spacing:.12em;
  color:var(--primary);
  margin-bottom:8px;
}

.query-input{
  width:100%;
  background:var(--bg-soft);
  border:1px solid var(--primary-soft);
  border-radius:10px;
  padding:10px 12px;
  color:#ffffff;
  font-size:13px;
  resize:none;
  min-height:70px;
  outline:none;
}

.query-input:focus{
  border-color:var(--primary);
}

.query-input::placeholder{
  color:rgba(255,255,255,0.45);
}

/* TASK BUTTONS */

.task-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

.task-btn{
  background:var(--bg-soft);
  border:1px solid var(--primary-soft);
  border-radius:8px;
  color:var(--text-dim);
  font-size:11px;
  padding:7px 4px;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
}

.task-btn:hover{
  background:rgba(255,127,0,0.15);
  border-color:var(--primary);
  color:var(--primary);
}

.task-btn.active{
  background:rgba(255,127,0,0.25);
  border-color:var(--primary);
  color:var(--primary);
}

/* RUN QUERY BUTTON */

.send-btn{
  width:100%;
  margin-top:12px;
  padding:11px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#ff7f00,#ff5e00);
  color:#ffffff;
  font-family:'Space Mono',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:.05em;
  cursor:pointer;
  transition:all .25s;
}

.send-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(255,127,0,0.35);
}

.send-btn:active{
  transform:scale(0.97);
}

.send-btn:disabled{
  opacity:.4;
  cursor:not-allowed;
}

/* ANSWER SECTION */

.answer-section{
  padding:0 16px 16px;
  display:none;
}

.answer-section.visible{
  display:block;
}

.answer-label{
  font-size:9px;
  font-family:'Space Mono',monospace;
  letter-spacing:.12em;
  color:var(--primary);
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
}

.answer-model-tag{
  color:var(--text-dim);
}

.answer-box{
  background:var(--bg-soft);
  border:1px solid var(--primary-soft);
  border-radius:10px;
  padding:12px;
  font-size:12px;
  line-height:1.7;
  max-height:200px;
  overflow:auto;
  white-space:pre-wrap;
}

.answer-box::-webkit-scrollbar{
  width:4px;
}

.answer-box::-webkit-scrollbar-thumb{
  background:rgba(255,127,0,0.4);
  border-radius:2px;
}

/* LOADING DOTS */

.loading-dots{
  display:inline-flex;
  gap:4px;
}

.loading-dots span{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--primary);
  animation:bounce 1.2s infinite;
}

.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
  0%,80%,100%{opacity:.3;transform:scale(.8)}
  40%{opacity:1;transform:scale(1)}
}

/* FOOTER */

.footer{
  text-align:center;
  padding:8px 16px 12px;
  font-size:9px;
  font-family:'Space Mono',monospace;
  color:var(--text-dim);
  border-top:1px solid var(--primary-soft);
}

.divider{
  height:1px;
  background:var(--primary-soft);
  margin:0 16px 14px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-hex">⬡</div>
  <div class="logo-text">
    <div class="logo-title">NeuroRoute AI</div>
    <div class="logo-sub">Green AI Routing System</div>
  </div>
  <div class="status-pill" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">checking</span>
  </div>
</div>

<div class="query-section">
  <div class="query-label">Ask anything</div>
  <div class="query-wrapper">
    <textarea class="query-input" id="query-input" placeholder="Type your question here..." rows="3"></textarea>
  </div>
  <button class="send-btn" id="send-btn">⬡ &nbsp;RUN QUERY</button>
</div>

<div class="answer-section" id="answer-section">
  <div class="divider"></div>
  <div class="answer-label">
    <span id="answer-label-text">Answer</span>
    <span class="answer-model-tag" id="model-tag"></span>
  </div>
  <div class="answer-box" id="answer-box"></div>
</div>

<div class="footer" id="footer-text">localhost:3000</div>

<script src="popup.js"></script>
</body>
</html>
