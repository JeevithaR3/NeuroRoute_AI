<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroRoute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: #0a0a0a; /* black background */
      color: #ffb366;      /* light orange text */
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      border-bottom: 1px solid rgba(255,127,0,0.2);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-hex {
      font-size: 20px;
      color: #ff7f00;
      filter: drop-shadow(0 0 8px rgba(255,127,0,0.7));
      animation: hexPulse 3s ease-in-out infinite;
    }

    @keyframes hexPulse {
      0%,100% { filter: drop-shadow(0 0 8px rgba(255,127,0,0.7)); }
      50%      { filter: drop-shadow(0 0 18px rgba(255,127,0,1)); }
    }

    .logo-text { flex: 1; }
    .logo-title { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: #ff7f00; }
    .logo-sub   { font-size: 10px; color: rgba(255,127,0,0.5); margin-top: 1px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #ff7f00;
      background: rgba(255,127,0,0.1);
      border: 1px solid rgba(255,127,0,0.2);
      padding: 4px 8px;
      border-radius: 20px;
      transition: all 0.3s;
    }

    .status-pill.online { color: #ff7f00; background: rgba(255,127,0,0.08); border-color: rgba(255,127,0,0.3); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ff7f00;
      transition: background 0.3s;
    }
    .status-pill.online .status-dot { background: #ff7f00; animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Query box ── */
    .query-section { padding: 16px; }

    .query-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: #ff7f00;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .query-wrapper { position: relative; }

    .query-input {
      width: 100%;
      background: rgba(255,127,0,0.05);
      border: 1px solid rgba(255,127,0,0.2);
      border-radius: 10px;
      color: #ffb366;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      resize: none;
      outline: none;
      min-height: 72px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .query-input::placeholder { color: rgba(255,127,0,0.3); }
    .query-input:focus { border-color: rgba(255,127,0,0.5); background: rgba(255,127,0,0.03); }

    /* ── Task buttons ── */
    .task-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .task-btn {
      background: rgba(255,127,0,0.05);
      border: 1px solid rgba(255,127,0,0.2);
      border-radius: 8px;
      color: rgba(255,127,0,0.6);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 7px 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .task-btn:hover {
      background: rgba(255,127,0,0.12);
      border-color: rgba(255,127,0,0.4);
      color: #ff7f00;
    }

    .task-btn.active {
      background: rgba(255,127,0,0.18);
      border-color: rgba(255,127,0,0.5);
      color: #ff7f00;
    }

    /* ── Send button ── */
    .send-btn {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(135deg, rgba(255,127,0,0.15), rgba(255,100,0,0.1));
      border: 1px solid rgba(255,127,0,0.35);
      border-radius: 10px;
      color: #ff7f00;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(255,127,0,0.22), rgba(255,100,0,0.15));
      border-color: rgba(255,127,0,0.6);
      box-shadow: 0 0 16px rgba(255,127,0,0.15);
    }

    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Answer box ── */
    .answer-section {
      padding: 0 16px 16px;
      display: none;
    }

    .answer-section.visible { display: block; }

    .answer-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: #ff7f00;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .answer-model-tag {
      font-size: 9px;
      color: rgba(255,127,0,0.5);
      font-weight: 400;
      letter-spacing: 0;
    }

    .answer-box {
      background: rgba(255,127,0,0.05);
      border: 1px solid rgba(255,127,0,0.15);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.7;
      color: #ffb366;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .answer-box::-webkit-scrollbar { width: 4px; }
    .answer-box::-webkit-scrollbar-track { background: transparent; }
    .answer-box::-webkit-scrollbar-thumb { background: rgba(255,127,0,0.3); border-radius: 2px; }

    /* Loading dots */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .loading-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ff7f00;
      animation: dotBounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* ── Footer status ── */
    .footer {
      padding: 8px 16px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: rgba(255,127,0,0.5);
      text-align: center;
      border-top: 1px solid rgba(255,127,0,0.1);
    }

    .divider {
      height: 1px;
      background: rgba(255,127,0,0.05);
      margin: 0 16px 14px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-hex">⬡</div>
  <div class="logo-text">
    <div class="logo-title">NeuroRoute AI</div>
    <div class="logo-sub">Green AI Routing System</div>
  </div>
  <div class="status-pill" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">checking</span>
  </div>
</div>

<div class="query-section">
  <div class="query-label">Ask anything</div>
  <div class="query-wrapper">
    <textarea class="query-input" id="query-input" placeholder="Type your question here..." rows="3"></textarea>
  </div>
  <button class="send-btn" id="send-btn">⬡ &nbsp;RUN QUERY</button>
</div>

<div class="answer-section" id="answer-section">
  <div class="divider"></div>
  <div class="answer-label">
    <span id="answer-label-text">Answer</span>
    <span class="answer-model-tag" id="model-tag"></span>
  </div>
  <div class="answer-box" id="answer-box"></div>
</div>

<div class="footer" id="footer-text">localhost:3000</div>

<script src="popup.js"></script>
</body>
</html>
